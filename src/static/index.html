<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividades Extracurriculares - Mergington High School</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://github.githubassets.com/favicons/favicon.svg"
    />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Atividades Extracurriculares</h2>
      <div id="user-controls">
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Entrar</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Sair</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filtrar Atividades</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input type="text" id="activity-search" placeholder="Buscar atividades..." />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filtrar por categoria:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">Todas</button>
                <button class="category-filter" data-category="sports">Esportes</button>
                <button class="category-filter" data-category="arts">Artes</button>
                <button class="category-filter" data-category="academic">Acadêmico</button>
                <button class="category-filter" data-category="community">Comunidade</button>
                <button class="category-filter" data-category="technology">Tecnologia</button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filtrar por dia:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">Todos os Dias</button>
                <button class="day-filter" data-day="Monday">Segunda-feira</button>
                <button class="day-filter" data-day="Tuesday">Terça-feira</button>
                <button class="day-filter" data-day="Wednesday">Quarta-feira</button>
                <button class="day-filter" data-day="Thursday">Quinta-feira</button>
                <button class="day-filter" data-day="Friday">Sexta-feira</button>
                <button class="day-filter" data-day="Saturday">Sábado</button>
                <button class="day-filter" data-day="Sunday">Domingo</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filtrar por horário:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">Todos os Horários</button>
                <button class="time-filter" data-time="morning">Antes das Aulas</button>
                <button class="time-filter" data-time="afternoon">Após as Aulas</button>
                <button class="time-filter" data-time="weekend">Final de Semana</button>
              </div>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Carregando atividades...</p>
            </div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
            <h3>Registrar para <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">E-mail do estudante:</label>
            <input type="email" id="email" required placeholder="seu-email@mergington.edu" />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Registrar</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Login do Professor</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Usuário:</label>
            <input type="text" id="username" required placeholder="Digite seu usuário" />
          </div>
          <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" required placeholder="Digite sua senha" />
          </div>
          <button type="submit">Entrar</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
